<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="1; url=/fashion-shop/" />
    <title>Open CarCare Demo</title>
    <style>
      :root {
        --ink: #1f2522;
        --muted: #617069;
        --paper: #f5f6f3;
        --line: #dfe5dd;
        --green: #1f4336;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family: "Trebuchet MS", Arial, sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 28px;
        box-shadow: 0 10px 28px rgb(31 67 54 / 6%);
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.1;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .links {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }

      a {
        display: flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        border: 1px solid var(--green);
        color: var(--green);
        font-weight: 800;
        text-decoration: none;
      }

      a.primary {
        background: var(--green);
        color: white;
      }

      small {
        display: block;
        margin-top: 18px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Open CarCare Demo</h1>
      <p>This launcher opens the GitHub Pages version of the car care demo.</p>
      <div class="links">
        <a class="primary" href="/fashion-shop/">Customer app</a>
        <a href="/fashion-shop/dashboard/">Admin dashboard</a>
        <a href="/fashion-shop/login/">Login page</a>
      </div>
      <small>Auto-opening the customer app now.</small>
    </main>
  </body>
</html>
